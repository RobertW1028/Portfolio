name: Check portfolio content

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate-content

      - name: Validate pull request scope
        if: github.event_name == 'pull_request'
        run: npm run validate-pr-scope

      - name: Build
        run: npm run build
